name: Docker Build and Push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t anoopsuvarna/test:latest \
                       -t anoopsuvarna/test:${{ github.sha }} .

      - name: Push Docker Images
        run: |
          docker push anoopsuvarna/test:latest
          docker push anoopsuvarna/test:${{ github.sha }}
